<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruimtereservering - HAN</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --magenta: #E5007D;
    --magenta-dark: #b8005f;
    --magenta-light: #fce8f3;
    --black: #0a0a0a;
    --white: #ffffff;
    --gray-50: #fafafa;
    --gray-100: #f4f4f4;
    --gray-200: #e8e8e8;
    --gray-400: #a0a0a0;
    --gray-600: #555555;
    --gray-800: #222222;
    --danger: #cc2200;
    --danger-light: #fff0ed;
    --success: #006e3c;
    --success-light: #e6f4ed;
    --radius: 8px;
    --radius-lg: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--gray-100);
    color: var(--black);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  header {
    background: var(--black);
    color: var(--white);
    padding: 10px 2rem;
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-brand { display: flex; align-items: center; gap: 14px; }
  .han-mark { width: 34px; height: 34px; background: var(--magenta); clip-path: polygon(50% 0%, 100% 100%, 0% 100%); flex-shrink: 0; }
  .header-brand h1 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 0; }
  .header-brand h1 span { color: var(--magenta); }

  .header-actions { display: flex; align-items: center; justify-content: flex-end; gap: 12px; flex-wrap: wrap; }
  #header-date { font-size: 12px; color: var(--gray-400); font-weight: 400; }
  .auth-form { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .auth-form input { width: 220px; padding: 8px 10px; border: 1.5px solid #333; border-radius: var(--radius); background: #151515; color: var(--white); font-family: 'Inter', sans-serif; font-size: 12px; outline: none; }
  .auth-form input:focus { border-color: var(--magenta); }
  .auth-user { display: none; align-items: center; gap: 8px; color: var(--gray-200); font-size: 12px; flex-wrap: wrap; justify-content: flex-end; }
  .role-badge { display: none; padding: 2px 7px; border-radius: 4px; background: var(--magenta); color: var(--white); font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; }

  button { font-family: inherit; }
  .auth-btn, .submit-btn, .save-btn, .reserve-btn-small, .add-room-btn {
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: background 0.15s, border-color 0.15s, color 0.15s, opacity 0.15s;
  }
  .auth-btn { padding: 8px 11px; background: var(--magenta); color: var(--white); font-size: 10px; white-space: nowrap; }
  .auth-btn.secondary { background: transparent; border: 1.5px solid #333; color: var(--gray-200); }
  .auth-btn:hover, .submit-btn:hover { background: var(--magenta-dark); }
  .auth-btn.secondary:hover { border-color: var(--magenta); color: var(--white); background: transparent; }

  .container { max-width: 1140px; margin: 0 auto; padding: 2rem 1.5rem; }
  .tabs { display: flex; gap: 2px; margin-bottom: 1.25rem; border-bottom: 2px solid var(--gray-200); flex-wrap: wrap; }
  .tab-btn { padding: 10px 20px; border: none; background: none; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--gray-400); letter-spacing: 0.5px; text-transform: uppercase; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
  .tab-btn:hover { color: var(--black); }
  .tab-btn.active { color: var(--magenta); border-bottom-color: var(--magenta); }
  .section { display: none; }
  .section.active { display: block; }

  .notice { display: none; background: var(--white); border: 1.5px solid var(--gray-200); border-radius: var(--radius-lg); padding: 13px 15px; margin-bottom: 1.25rem; color: var(--gray-600); box-shadow: var(--shadow); }
  .notice.show { display: block; }
  .notice.error { color: var(--danger); background: var(--danger-light); border-color: #ffcfc6; }
  .notice.success { color: var(--success); background: var(--success-light); border-color: #a3d4bc; }

  .date-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .date-nav button { width: 34px; height: 34px; border: 1.5px solid var(--gray-200); background: var(--white); border-radius: var(--radius); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: var(--black); transition: all 0.15s; line-height: 1; }
  .date-nav button:hover { border-color: var(--magenta); color: var(--magenta); }
  .date-nav h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0; }
  input, select { outline: none; }
  .date-nav input[type="date"], .form-group input, .form-group select, .search-bar input, .admin-room-row input { font-family: 'Inter', sans-serif; border: 1.5px solid var(--gray-200); border-radius: var(--radius); background: var(--white); color: var(--black); transition: border-color 0.15s, box-shadow 0.15s; }
  .date-nav input[type="date"] { font-size: 13px; padding: 7px 10px; cursor: pointer; }
  .date-nav input:focus, .form-group input:focus, .form-group select:focus, .search-bar input:focus, .admin-room-row input:focus { border-color: var(--magenta); box-shadow: 0 0 0 3px rgba(229,0,125,0.08); }

  .rooms-grid, .my-bookings-list { display: grid; gap: 8px; }
  .room-row { background: var(--white); border: 1.5px solid var(--gray-200); border-radius: var(--radius-lg); padding: 1rem 1.25rem; display: grid; grid-template-columns: 210px 1fr auto; gap: 1rem; align-items: center; transition: box-shadow 0.15s, border-color 0.15s; }
  .room-row:hover { box-shadow: var(--shadow); border-color: var(--gray-400); }
  .room-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
  .room-meta { font-size: 11px; color: var(--gray-400); margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .timeline { position: relative; height: 32px; background: var(--gray-100); border-radius: 6px; overflow: visible; }
  .timeline-hours { display: flex; justify-content: space-between; font-size: 10px; color: var(--gray-400); margin-top: 3px; }
  .booking-block { position: absolute; top: 3px; height: 26px; background: var(--magenta); border-radius: 5px; display: flex; align-items: center; padding: 0 7px; overflow: hidden; cursor: pointer; transition: opacity 0.15s; }
  .booking-block:hover { opacity: 0.8; }
  .booking-block span { font-size: 11px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
  .reserve-btn-small { padding: 7px 14px; background: var(--black); color: white; font-size: 11px; white-space: nowrap; }
  .reserve-btn-small:hover, .save-btn:hover { background: var(--magenta); }

  .form-card, .admin-card { background: var(--white); border: 1.5px solid var(--gray-200); border-radius: var(--radius-lg); padding: 2rem; max-width: 620px; }
  .admin-card { max-width: none; padding: 1.5rem; margin-bottom: 1.25rem; }
  .form-card h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 1.5rem; letter-spacing: 0; }
  .admin-card h3 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1.5px solid var(--gray-200); }
  .form-group { margin-bottom: 1.1rem; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--gray-600); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.6px; }
  .form-group input, .form-group select { width: 100%; padding: 10px 12px; font-size: 14px; appearance: none; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .capacity-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--magenta-light); color: var(--magenta); padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 500; margin-top: 7px; }
  .conflict-warning { background: var(--danger-light); border: 1.5px solid #ffcfc6; border-radius: var(--radius); padding: 11px 14px; font-size: 13px; color: var(--danger); margin-bottom: 1rem; display: none; }
  .conflict-warning.show { display: block; }
  .submit-btn { width: 100%; padding: 13px; background: var(--magenta); color: white; font-size: 13px; margin-top: 0.5rem; }
  .submit-btn:disabled, .save-btn:disabled, .auth-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .search-bar { margin-bottom: 1.5rem; }
  .search-bar input { padding: 10px 14px; font-size: 14px; width: 300px; }
  .booking-card { background: var(--white); border: 1.5px solid var(--gray-200); border-radius: var(--radius-lg); padding: 1rem 1.25rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; transition: box-shadow 0.15s; }
  .booking-card:hover { box-shadow: var(--shadow); }
  .bk-room { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
  .bk-details, .bk-who { font-size: 12px; color: var(--gray-600); margin-top: 2px; }
  .bk-who { color: var(--gray-400); }
  .cancel-btn, .del-btn { border: 1.5px solid var(--gray-200); background: none; border-radius: var(--radius); cursor: pointer; color: var(--danger); transition: all 0.15s; }
  .cancel-btn { padding: 6px 14px; font-size: 12px; font-weight: 500; }
  .cancel-btn:hover, .del-btn:hover { background: var(--danger-light); border-color: var(--danger); }

  .admin-room-row { display: grid; grid-template-columns: 100px 1fr 90px 1fr 36px; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--gray-100); align-items: center; }
  .admin-room-row:last-child { border-bottom: none; }
  .admin-room-row input { width: 100%; padding: 8px 10px; font-size: 13px; }
  .admin-room-row input:disabled { background: var(--gray-100); color: var(--gray-600); }
  .del-btn { width: 32px; height: 32px; font-size: 16px; }
  .add-room-btn { padding: 8px 16px; background: var(--gray-100); color: var(--black); border: 1.5px solid var(--gray-200); font-size: 11px; margin-top: 0.75rem; }
  .add-room-btn:hover { background: var(--gray-200); }
  .save-btn { padding: 10px 22px; background: var(--black); color: white; font-size: 11px; margin-top: 1rem; }

  .status-badge { display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; margin-bottom: 1rem; }
  .status-badge.connected { background: var(--success-light); color: var(--success); border: 1.5px solid #a3d4bc; }
  .status-badge.error { background: var(--danger-light); color: var(--danger); border: 1.5px solid #ffcfc6; }
  .status-badge.checking { background: var(--gray-100); color: var(--gray-600); border: 1.5px solid var(--gray-200); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.green { background: var(--success); }
  .status-dot.red { background: var(--danger); }
  .status-dot.gray { background: var(--gray-400); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 3rem; color: var(--gray-400); font-size: 14px; }
  .tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; background: var(--gray-100); color: var(--gray-600); border: 1px solid var(--gray-200); text-transform: uppercase; letter-spacing: 0.3px; }
  .tooltip { position: fixed; background: var(--black); color: white; padding: 7px 11px; border-radius: 7px; font-size: 12px; pointer-events: none; z-index: 999; max-width: 240px; line-height: 1.5; display: none; }

  @media (max-width: 760px) {
    header { padding: 12px 1rem; align-items: flex-start; }
    .header-actions { width: 100%; }
    .auth-form input { width: min(100%, 260px); }
    .container { padding: 1rem; }
    .room-row, .form-row, .admin-room-row { grid-template-columns: 1fr; }
    .booking-card { align-items: flex-start; flex-direction: column; }
    .search-bar input { width: 100%; }
  }
</style>
</head>
<body>
<header>
  <div class="header-brand">
    <div class="han-mark"></div>
    <h1>Ruimte<span>reservering</span></h1>
  </div>
  <div class="header-actions">
    <span id="header-date"></span>
    <div id="auth-signed-out" class="auth-form">
      <input type="email" id="auth-email" placeholder="E-mailadres" autocomplete="email">
      <button class="auth-btn" id="login-btn" onclick="sendMagicLink()">Login link</button>
    </div>
    <div id="auth-signed-in" class="auth-user">
      <span class="role-badge" id="role-badge">Admin</span>
      <span id="auth-user-label"></span>
      <button class="auth-btn secondary" onclick="signOut()">Uitloggen</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('overzicht')">Overzicht</button>
    <button class="tab-btn" onclick="switchTab('reserveren')">Reserveren</button>
    <button class="tab-btn" onclick="switchTab('mijn')">Mijn reserveringen</button>
    <button class="tab-btn" id="beheer-tab-btn" onclick="switchTab('beheer')" style="display:none">Beheer</button>
  </div>

  <div id="app-notice" class="notice"></div>

  <div id="tab-overzicht" class="section active">
    <div class="date-nav">
      <button onclick="changeDay(-1)" aria-label="Vorige dag">&#8249;</button>
      <h2 id="overview-date-label"></h2>
      <button onclick="changeDay(1)" aria-label="Volgende dag">&#8250;</button>
      <input type="date" id="date-picker" onchange="onDatePick()">
    </div>
    <div id="rooms-grid" class="rooms-grid"><div class="empty-state">Laden...</div></div>
  </div>

  <div id="tab-reserveren" class="section">
    <div class="form-card">
      <h2>Nieuwe reservering</h2>
      <div class="form-group">
        <label>Jouw naam</label>
        <input type="text" id="f-name" placeholder="Voornaam Achternaam" maxlength="120">
      </div>
      <div class="form-group">
        <label>Ruimte</label>
        <select id="f-room" onchange="onRoomSelect()"><option value="">Kies een ruimte</option></select>
        <div id="capacity-info"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Datum</label>
          <input type="date" id="f-date" onchange="checkConflict()">
        </div>
        <div class="form-group">
          <label>Begintijd</label>
          <input type="time" id="f-start" value="09:00" onchange="checkConflict()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Eindtijd</label>
          <input type="time" id="f-end" value="10:00" onchange="checkConflict()">
        </div>
        <div class="form-group">
          <label>Aantal personen</label>
          <input type="number" id="f-persons" min="1" placeholder="bijv. 4">
        </div>
      </div>
      <div class="form-group">
        <label>Omschrijving (optioneel)</label>
        <input type="text" id="f-desc" placeholder="bijv. teamoverleg, workshop..." maxlength="500">
      </div>
      <div id="conflict-warning" class="conflict-warning"></div>
      <button class="submit-btn" id="submit-btn" onclick="submitBooking()">Reservering plaatsen</button>
    </div>
  </div>

  <div id="tab-mijn" class="section">
    <div id="my-bookings-list" class="my-bookings-list"><div class="empty-state">Laden...</div></div>
  </div>

  <div id="tab-beheer" class="section">
    <div class="admin-card">
      <h3>Supabase verbinding</h3>
      <div id="supabase-status"><div class="status-badge checking"><div class="status-dot gray"></div>Nog niet getest</div></div>
      <p style="font-size:13px;color:var(--gray-600);line-height:1.7">Beheer is gekoppeld aan Supabase Auth. Alleen gebruikers met <strong>role = admin</strong> in de tabel <strong>profiles</strong> krijgen deze tab te zien.</p>
      <button class="save-btn" onclick="testSupabaseConnection()">Verbinding testen</button>
    </div>
    <div class="admin-card">
      <h3>Ruimtes beheren</h3>
      <div id="admin-rooms-list"></div>
      <button class="add-room-btn" onclick="addAdminRoom()">+ Ruimte toevoegen</button><br>
      <button class="save-btn" onclick="saveRooms()">Ruimtes opslaan</button>
    </div>
    <div class="admin-card">
      <h3>Alle reserveringen</h3>
      <div id="all-bookings-admin"></div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://oappvdfjyvbmvqrjvnmv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6Im9hcHB2ZGZqeXZibXZxcmp2bm12Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNTM4OTEsImV4cCI6MjA5MzcyOTg5MX0.Q-cL-Z9jDlY1Uw3khnS3yLAMteM-xjhyR9SGuJ_Qq8g'.replace('eyJpc3MiOiJIUzI1Ni', 'eyJpc3MiOiJzdXBhYmFzZS');
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
});

const DAY_START = 7;
const DAY_END = 22;
let rooms = [];
let bookings = [];
let currentDate = new Date();
let currentUser = null;
let currentProfile = null;
let isAdmin = false;
currentDate.setHours(0,0,0,0);

document.addEventListener('DOMContentLoaded', async () => {
  updateHeaderDate();
  document.getElementById('f-date').value = dateStr(new Date());
  document.getElementById('date-picker').value = dateStr(currentDate);
  document.getElementById('overview-date-label').textContent = formatDate(currentDate);
  document.getElementById('auth-email').addEventListener('keydown', event => {
    if (event.key === 'Enter') sendMagicLink();
  });

  const { data, error } = await supabaseClient.auth.getSession();
  if (error) showNotice('Sessie ophalen mislukt: ' + error.message, 'error');
  await handleSession(data ? data.session : null);

  supabaseClient.auth.onAuthStateChange(async (_event, session) => {
    await handleSession(session);
  });
});

async function handleSession(session) {
  currentUser = session ? session.user : null;
  currentProfile = null;
  isAdmin = false;
  updateAuthUi();

  if (!currentUser) {
    rooms = [];
    bookings = [];
    renderGuestState();
    return;
  }

  await loadProfile();
  await loadRooms();
  await loadBookings();
  updateAuthUi();
  renderOverview();
  renderMyBookings();
  if (isAdmin) {
    renderAdminRooms();
    renderAllBookingsAdmin();
  }
}

function updateHeaderDate() {
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });
}

function updateAuthUi() {
  const signedOut = document.getElementById('auth-signed-out');
  const signedIn = document.getElementById('auth-signed-in');
  const userLabel = document.getElementById('auth-user-label');
  const roleBadge = document.getElementById('role-badge');
  const beheerBtn = document.getElementById('beheer-tab-btn');

  if (!currentUser) {
    signedOut.style.display = 'flex';
    signedIn.style.display = 'none';
    beheerBtn.style.display = 'none';
    roleBadge.style.display = 'none';
    return;
  }

  signedOut.style.display = 'none';
  signedIn.style.display = 'flex';
  userLabel.textContent = currentUser.email || 'Ingelogd';
  roleBadge.style.display = isAdmin ? 'inline-block' : 'none';
  beheerBtn.style.display = isAdmin ? '' : 'none';
}

function renderGuestState() {
  showNotice('Log in met je e-mailadres om ruimtes en reserveringen te bekijken. Supabase RLS blokkeert anonieme toegang.', '');
  document.getElementById('rooms-grid').innerHTML = '<div class="empty-state">Log in om het overzicht te laden.</div>';
  document.getElementById('my-bookings-list').innerHTML = '<div class="empty-state">Log in om je reserveringen te bekijken.</div>';
  populateRoomSelect();
  switchTabDirect('overzicht');
}

async function sendMagicLink() {
  const emailInput = document.getElementById('auth-email');
  const btn = document.getElementById('login-btn');
  const email = emailInput.value.trim();
  if (!email) { showNotice('Vul eerst je e-mailadres in.', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Versturen...';
  const redirectTo = window.location.origin + window.location.pathname;
  const { error } = await supabaseClient.auth.signInWithOtp({ email, options: { emailRedirectTo: redirectTo } });
  btn.disabled = false;
  btn.textContent = 'Login link';

  if (error) {
    showNotice('Login link versturen mislukt: ' + error.message, 'error');
    return;
  }
  showNotice('Login link verstuurd. Open je mail en klik op de link om in te loggen.', 'success');
}

async function signOut() {
  await supabaseClient.auth.signOut();
  currentUser = null;
  currentProfile = null;
  isAdmin = false;
  updateAuthUi();
  renderGuestState();
}

async function loadProfile() {
  const { data, error } = await supabaseClient
    .from('profiles')
    .select('id, display_name, role')
    .eq('id', currentUser.id)
    .maybeSingle();

  if (error) {
    showNotice('Profiel laden mislukt: ' + error.message, 'error');
    return;
  }
  currentProfile = data;
  isAdmin = data && data.role === 'admin';

  if (!currentProfile) {
    showNotice('Je bent ingelogd, maar er is nog geen profile rij gevonden. Controleer de trigger handle_new_user in Supabase.', 'error');
  } else {
    hideNotice();
    const nameInput = document.getElementById('f-name');
    if (!nameInput.value && currentProfile.display_name) nameInput.value = currentProfile.display_name;
  }
}

async function loadRooms() {
  if (!currentUser) return;
  const { data, error } = await supabaseClient
    .from('rooms')
    .select('id, name, capacity, notes, active')
    .eq('active', true)
    .order('id', { ascending: true });

  if (error) {
    showNotice('Ruimtes laden mislukt: ' + error.message, 'error');
    rooms = [];
    return;
  }
  rooms = data || [];
  populateRoomSelect();
}

async function loadBookings() {
  if (!currentUser) return;
  const { data, error } = await supabaseClient
    .from('reserveringen')
    .select('id, user_id, name, room_id, date, start_time, end_time, persons, description, created_at')
    .order('date', { ascending: true })
    .order('start_time', { ascending: true });

  if (error) {
    showNotice('Reserveringen laden mislukt: ' + error.message, 'error');
    bookings = [];
    return;
  }

  bookings = (data || []).map(row => {
    const room = rooms.find(r => r.id === row.room_id);
    return {
      id: row.id,
      userId: row.user_id,
      name: row.name,
      roomId: row.room_id,
      roomName: room ? room.name : row.room_id,
      date: row.date,
      start: normalizeTime(row.start_time),
      end: normalizeTime(row.end_time),
      persons: row.persons || '',
      desc: row.description || '',
      created: row.created_at
    };
  });
}

async function pushToSupabase(booking) {
  const { error } = await supabaseClient.from('reserveringen').insert([{
    user_id: currentUser.id,
    name: booking.name,
    room_id: booking.roomId,
    date: booking.date,
    start_time: booking.start,
    end_time: booking.end,
    persons: booking.persons ? Number(booking.persons) : null,
    description: booking.desc || null
  }]);
  if (error) throw error;
}

async function deleteFromSupabase(id) {
  const { error } = await supabaseClient.from('reserveringen').delete().eq('id', id);
  if (error) throw error;
}

async function testSupabaseConnection() {
  const statusDiv = document.getElementById('supabase-status');
  statusDiv.innerHTML = '<div class="status-badge checking"><div class="status-dot gray"></div>Verbinding testen...</div>';
  try {
    const { error } = await supabaseClient.from('rooms').select('id', { count: 'exact', head: true });
    if (error) throw error;
    statusDiv.innerHTML = '<div class="status-badge connected"><div class="status-dot green"></div>Verbonden met Supabase en rooms is bereikbaar</div>';
  } catch (err) {
    statusDiv.innerHTML = '<div class="status-badge error"><div class="status-dot red"></div>Verbinding mislukt: ' + escapeHtml(err.message) + '</div>';
  }
}

function switchTab(name) {
  if (!currentUser && name !== 'overzicht') { showNotice('Log eerst in om deze tab te gebruiken.', 'error'); return; }
  if (name === 'beheer' && !isAdmin) { showNotice('Alleen admins kunnen beheer openen.', 'error'); return; }
  if (name === 'mijn') renderMyBookings();
  if (name === 'beheer') { renderAdminRooms(); renderAllBookingsAdmin(); }
  switchTabDirect(name);
}

function switchTabDirect(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    const t = b.textContent.trim().toLowerCase();
    if (name === 'overzicht' && t === 'overzicht') b.classList.add('active');
    if (name === 'reserveren' && t === 'reserveren') b.classList.add('active');
    if (name === 'mijn' && t === 'mijn reserveringen') b.classList.add('active');
    if (name === 'beheer' && b.id === 'beheer-tab-btn') b.classList.add('active');
  });
}

function changeDay(delta) {
  currentDate.setDate(currentDate.getDate() + delta);
  document.getElementById('date-picker').value = dateStr(currentDate);
  renderOverview();
}

function onDatePick() {
  const val = document.getElementById('date-picker').value;
  if (val) {
    currentDate = new Date(val + 'T00:00:00');
    renderOverview();
  }
}

function renderOverview() {
  document.getElementById('overview-date-label').textContent = formatDate(currentDate);
  const grid = document.getElementById('rooms-grid');
  if (!currentUser) { renderGuestState(); return; }
  if (rooms.length === 0) { grid.innerHTML = '<div class="empty-state">Geen actieve ruimtes gevonden.</div>'; return; }

  const todayStr = dateStr(currentDate);
  const todayBookings = bookings.filter(b => b.date === todayStr);
  grid.innerHTML = rooms.map(room => {
    const rb = todayBookings.filter(b => b.roomId === room.id);
    const timelineBlocks = rb.map(b => {
      const left = timeToPercent(b.start);
      const width = timeToPercent(b.end) - left;
      const tip = escapeHtml(b.name + ' - ' + displayTime(b.start) + '-' + displayTime(b.end) + (b.desc ? ' - ' + b.desc : ''));
      return '<div class="booking-block" style="left:' + left + '%;width:' + width + '%" onmouseenter="showTooltip(event,\'' + tip.replace(/'/g, '&#39;') + '\')" onmouseleave="hideTooltip()"><span>' + escapeHtml(b.name) + '</span></div>';
    }).join('');
    const hours = [];
    for (let h = DAY_START; h <= DAY_END; h += 3) hours.push(h + ':00');
    const cap = room.capacity ? 'max ' + room.capacity + ' pers.' : '';
    const notes = room.notes ? ' - ' + escapeHtml(room.notes) : '';
    return '<div class="room-row"><div class="room-info"><div class="room-name">' + escapeHtml(room.name) + '</div><div class="room-meta"><span class="tag">' + escapeHtml(room.id) + '</span> ' + cap + notes + '</div></div><div><div class="timeline">' + timelineBlocks + '</div><div class="timeline-hours">' + hours.map(h => '<span>' + h + '</span>').join('') + '</div></div><button class="reserve-btn-small" onclick="quickReserve(\'' + escapeAttr(room.id) + '\')">Reserveer</button></div>';
  }).join('');
}

function quickReserve(roomId) {
  if (!currentUser) { showNotice('Log eerst in om te reserveren.', 'error'); return; }
  switchTabDirect('reserveren');
  document.getElementById('f-room').value = roomId;
  document.getElementById('f-date').value = dateStr(currentDate);
  onRoomSelect();
  checkConflict();
  document.getElementById('f-name').focus();
}

function populateRoomSelect() {
  const sel = document.getElementById('f-room');
  const current = sel.value;
  sel.innerHTML = '<option value="">Kies een ruimte</option>' + rooms.map(r => '<option value="' + escapeAttr(r.id) + '">' + escapeHtml(r.id + ' - ' + r.name + (r.capacity ? ' (max ' + r.capacity + ')' : '')) + '</option>').join('');
  if (current) sel.value = current;
}

function onRoomSelect() {
  const roomId = document.getElementById('f-room').value;
  const info = document.getElementById('capacity-info');
  if (!roomId) { info.innerHTML = ''; return; }
  const room = rooms.find(r => r.id === roomId);
  if (room && room.capacity) info.innerHTML = '<div class="capacity-badge">Maximaal ' + room.capacity + ' personen' + (room.notes ? ' - ' + escapeHtml(room.notes) : '') + '</div>';
  else info.innerHTML = '';
  checkConflict();
}

function checkConflict() {
  const roomId = document.getElementById('f-room').value;
  const date = document.getElementById('f-date').value;
  const start = document.getElementById('f-start').value;
  const end = document.getElementById('f-end').value;
  const warn = document.getElementById('conflict-warning');
  const btn = document.getElementById('submit-btn');

  if (!roomId || !date || !start || !end) { warn.classList.remove('show'); btn.disabled = false; return; }
  if (start >= end) { warn.textContent = 'Eindtijd moet na begintijd liggen.'; warn.classList.add('show'); btn.disabled = true; return; }

  const conflicts = bookings.filter(b => b.roomId === roomId && b.date === date && b.start < end && b.end > start);
  if (conflicts.length > 0) {
    const c = conflicts[0];
    warn.innerHTML = 'Al gereserveerd van <strong>' + displayTime(c.start) + '</strong> tot <strong>' + displayTime(c.end) + '</strong> door <strong>' + escapeHtml(c.name) + '</strong>.';
    warn.classList.add('show');
    btn.disabled = true;
  } else {
    warn.classList.remove('show');
    btn.disabled = false;
  }
}

async function submitBooking() {
  if (!currentUser) { showNotice('Log eerst in om te reserveren.', 'error'); return; }
  const name = document.getElementById('f-name').value.trim();
  const roomId = document.getElementById('f-room').value;
  const date = document.getElementById('f-date').value;
  const start = document.getElementById('f-start').value;
  const end = document.getElementById('f-end').value;
  const persons = document.getElementById('f-persons').value;
  const desc = document.getElementById('f-desc').value.trim();
  if (!name || !roomId || !date || !start || !end) { showNotice('Vul alle verplichte velden in.', 'error'); return; }

  const room = rooms.find(r => r.id === roomId);
  if (room && room.capacity && persons && Number(persons) > room.capacity) {
    if (!confirm('Let op: ' + persons + ' personen maar max ' + room.capacity + '. Toch doorgaan?')) return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Opslaan...';
  try {
    await pushToSupabase({ name, roomId, date, start, end, persons, desc });
    await loadBookings();
    renderOverview();
    renderMyBookings();
    showNotice('Reservering bevestigd.', 'success');
    document.getElementById('f-room').value = '';
    document.getElementById('f-persons').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('capacity-info').innerHTML = '';
    document.getElementById('conflict-warning').classList.remove('show');
  } catch (err) {
    showNotice('Opslaan mislukt: ' + explainSupabaseError(err), 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Reservering plaatsen';
  }
}

function renderMyBookings() {
  const list = document.getElementById('my-bookings-list');
  if (!currentUser) { list.innerHTML = '<div class="empty-state">Log in om je reserveringen te bekijken.</div>'; return; }
  const today = new Date(); today.setHours(0,0,0,0);
  const mine = bookings.filter(b => b.userId === currentUser.id && new Date(b.date + 'T00:00:00') >= today).sort(sortBookings);
  if (mine.length === 0) { list.innerHTML = '<div class="empty-state">Geen aankomende reserveringen gevonden.</div>'; return; }
  list.innerHTML = mine.map(renderBookingCard).join('');
}

function renderBookingCard(b) {
  const dateLabel = new Date(b.date + 'T00:00:00').toLocaleDateString('nl-NL', { weekday: 'short', day: 'numeric', month: 'short' });
  return '<div class="booking-card"><div><div class="bk-room">' + escapeHtml(b.roomName || b.roomId) + '</div><div class="bk-details">' + escapeHtml(dateLabel + ' - ' + displayTime(b.start) + '-' + displayTime(b.end) + (b.persons ? ' - ' + b.persons + ' pers.' : '')) + '</div>' + (b.desc ? '<div class="bk-who">' + escapeHtml(b.desc) + '</div>' : '') + '</div><button class="cancel-btn" onclick="cancelBooking(\'' + escapeAttr(b.id) + '\')">Annuleren</button></div>';
}

async function cancelBooking(id) {
  if (!confirm('Wil je deze reservering annuleren?')) return;
  try {
    await deleteFromSupabase(id);
    await loadBookings();
    renderOverview();
    renderMyBookings();
    if (isAdmin) renderAllBookingsAdmin();
    showNotice('Reservering geannuleerd.', 'success');
  } catch (err) {
    showNotice('Annuleren mislukt: ' + err.message, 'error');
  }
}

function renderAdminRooms() {
  const list = document.getElementById('admin-rooms-list');
  if (!isAdmin) { list.innerHTML = '<div class="empty-state">Alleen admins kunnen ruimtes beheren.</div>'; return; }
  list.innerHTML = rooms.map((r, i) => renderAdminRoomRow(r, i, false)).join('');
}

function renderAdminRoomRow(r, i, isNew) {
  return '<div class="admin-room-row" data-index="' + i + '" data-original-id="' + escapeAttr(isNew ? '' : r.id) + '"><input class="num" type="text" value="' + escapeAttr(r.id || '') + '" placeholder="ID" ' + (isNew ? '' : 'disabled') + '><input type="text" value="' + escapeAttr(r.name || '') + '" placeholder="Naam"><input class="num" type="number" min="1" value="' + escapeAttr(r.capacity || '') + '" placeholder="Max"><input type="text" value="' + escapeAttr(r.notes || '') + '" placeholder="Opmerking"><button class="del-btn" onclick="deleteRoom(' + i + ')">&#215;</button></div>';
}

function addAdminRoom() {
  if (!isAdmin) return;
  rooms.push({ id: '', name: '', capacity: null, notes: '', active: true });
  const list = document.getElementById('admin-rooms-list');
  list.innerHTML += renderAdminRoomRow(rooms[rooms.length - 1], rooms.length - 1, true);
}

async function deleteRoom(i) {
  if (!isAdmin) return;
  const room = rooms[i];
  if (!room || !confirm('Ruimte verwijderen uit de actieve lijst?')) return;
  try {
    if (room.id) {
      const { error } = await supabaseClient.from('rooms').update({ active: false }).eq('id', room.id);
      if (error) throw error;
      await loadRooms();
    } else {
      rooms.splice(i, 1);
    }
    renderAdminRooms();
    renderOverview();
    showNotice('Ruimte verwijderd uit de actieve lijst.', 'success');
  } catch (err) {
    showNotice('Ruimte verwijderen mislukt: ' + err.message, 'error');
  }
}

async function saveRooms() {
  if (!isAdmin) return;
  const rows = Array.from(document.querySelectorAll('.admin-room-row'));
  try {
    for (const row of rows) {
      const inputs = row.querySelectorAll('input');
      const originalId = row.dataset.originalId;
      const id = inputs[0].value.trim();
      const name = inputs[1].value.trim();
      const capacity = inputs[2].value ? Number(inputs[2].value) : null;
      const notes = inputs[3].value.trim();
      if (!id || !name) continue;
      if (originalId) {
        const { error } = await supabaseClient.from('rooms').update({ name, capacity, notes, active: true }).eq('id', originalId);
        if (error) throw error;
      } else {
        const { error } = await supabaseClient.from('rooms').insert([{ id, name, capacity, notes, active: true }]);
        if (error) throw error;
      }
    }
    await loadRooms();
    renderAdminRooms();
    renderOverview();
    showNotice('Ruimtes opgeslagen.', 'success');
  } catch (err) {
    showNotice('Ruimtes opslaan mislukt: ' + err.message, 'error');
  }
}

function renderAllBookingsAdmin() {
  const div = document.getElementById('all-bookings-admin');
  if (!isAdmin) { div.innerHTML = '<div class="empty-state">Alleen admins kunnen reserveringen beheren.</div>'; return; }
  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = bookings.filter(b => new Date(b.date + 'T00:00:00') >= today).sort(sortBookings);
  if (upcoming.length === 0) { div.innerHTML = '<div class="empty-state">Geen aankomende reserveringen.</div>'; return; }
  div.innerHTML = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="border-bottom:1.5px solid var(--gray-200)"><th style="text-align:left;padding:8px 6px">Datum</th><th style="text-align:left;padding:8px 6px">Tijd</th><th style="text-align:left;padding:8px 6px">Ruimte</th><th style="text-align:left;padding:8px 6px">Naam</th><th style="text-align:left;padding:8px 6px">Pers.</th><th style="padding:8px 6px"></th></tr></thead><tbody>' + upcoming.map(b => {
    const dl = new Date(b.date + 'T00:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
    return '<tr style="border-bottom:1px solid var(--gray-100)"><td style="padding:8px 6px">' + escapeHtml(dl) + '</td><td style="padding:8px 6px">' + escapeHtml(displayTime(b.start) + '-' + displayTime(b.end)) + '</td><td style="padding:8px 6px">' + escapeHtml(b.roomName || b.roomId) + '</td><td style="padding:8px 6px;font-weight:500">' + escapeHtml(b.name) + '</td><td style="padding:8px 6px">' + escapeHtml(b.persons || '-') + '</td><td style="padding:8px 6px"><button class="cancel-btn" onclick="cancelBooking(\'' + escapeAttr(b.id) + '\')">&#215;</button></td></tr>';
  }).join('') + '</tbody></table></div>';
}

function showTooltip(e, text) {
  const t = document.getElementById('tooltip');
  t.textContent = decodeHtml(text);
  t.style.display = 'block';
  t.style.left = (e.clientX + 12) + 'px';
  t.style.top = (e.clientY - 10) + 'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }
function showNotice(message, type) { const n = document.getElementById('app-notice'); n.textContent = message; n.className = 'notice show' + (type ? ' ' + type : ''); }
function hideNotice() { const n = document.getElementById('app-notice'); n.className = 'notice'; n.textContent = ''; }
function formatDate(d) { return d.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }); }
function dateStr(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
function normalizeTime(time) { return String(time || '').slice(0, 5); }
function displayTime(time) { return normalizeTime(time); }
function timeToPercent(timeStr) { const parts = normalizeTime(timeStr).split(':').map(Number); const total = (DAY_END - DAY_START) * 60; const pos = (parts[0] - DAY_START) * 60 + (parts[1] || 0); return Math.max(0, Math.min(100, (pos / total) * 100)); }
function sortBookings(a, b) { return a.date.localeCompare(b.date) || a.start.localeCompare(b.start); }
function escapeHtml(value) { return String(value == null ? '' : value).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
function escapeAttr(value) { return escapeHtml(value).replace(/'/g, '&#39;'); }
function decodeHtml(value) { const el = document.createElement('textarea'); el.innerHTML = value; return el.value; }
function explainSupabaseError(err) { if (err && err.code === '23P01') return 'deze ruimte is op dit tijdstip al gereserveerd.'; return err.message || String(err); }
</script>
</body>
